name: LinkedIn Daily Crawler

on:
  schedule:
    - cron: '0 0 * * *'   # 7:00 sáng GMT+7 = 00:00 UTC mỗi ngày
  workflow_dispatch:        # cho phép chạy thủ công trên GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run crawler
        env:
          LI_AT: ${{ secrets.LI_AT }}
        run: python crawler.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-${{ github.run_number }}
          path: data/jobs.json
          retention-days: 30

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: crawl jobs $(date +'%Y-%m-%d')"
          git push
