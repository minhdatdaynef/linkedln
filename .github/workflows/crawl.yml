name: Daily Job Match

on:
  schedule:
    - cron: '0 0 * * *'        # 07:00 sáng GMT+7 mỗi ngày (append 1 lần/ngày)
  workflow_dispatch:           # cho phép chạy tay khi cần

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  match:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Crawl + APPEND + chấm điểm + sinh web
        env:
          GROG_API_KEY: ${{ secrets.GROG_API_KEY }}
          CV_TEXT: ${{ secrets.CV_TEXT }}
        run: |
          python match_jobs.py            # append: chỉ chấm job MỚI
          python filter_jobs.py           # lọc cấp bậc Executive/Specialist
          python gen_html.py site/index.html

      - name: Email digest "Top 3 job nên nộp hôm nay"
        env:
          SEND_EMAIL: ${{ secrets.SEND_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SITE_URL: https://emchicolennha.vercel.app
        run: python send_digest.py

      - name: Commit kho + web (giữ lịch sử để hôm sau append tiếp)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs_db.json site/index.html
          git diff --staged --quiet || git commit -m "chore: daily job match $(date +'%Y-%m-%d')"
          git push

      - name: Deploy web lên Vercel (production)
        working-directory: site
        env:
          VERCEL_ORG_ID: team_ANvEGkjcTK84M75DOj814rtB
          VERCEL_PROJECT_ID: prj_g2RoU9cA4VM7mLbRtkwo4WwtBzGb
        run: npx vercel@latest --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
