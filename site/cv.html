<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Đề xuất sửa CV theo JD</title>
<style>
:root{--bg:#f6f5f2;--card:#fff;--bd:#e6e3dd;--tx:#1d1c1a;--mut:#6a665f;--acc:#3a35a3}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--tx);
font-family:"Be Vietnam Pro","Segoe UI",system-ui,sans-serif;font-size:15px}
.wrap{max-width:880px;margin:0 auto;padding:22px 16px}
h1{font-size:23px;margin:0 0 4px} .sub{color:var(--mut);margin:0 0 14px;font-size:14px}
.back{display:inline-block;color:var(--mut);text-decoration:none;font-size:13.5px;margin-bottom:8px}
.back:hover{color:var(--acc)}
.box{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;margin-bottom:18px}
.note{font-size:12.5px;color:var(--mut);margin:0 0 12px;font-style:italic}
.in{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font:inherit;font-size:14px;background:#fff;margin-bottom:9px}
.in:focus{outline:none;border-color:var(--acc)}
.ta{min-height:96px;resize:vertical;line-height:1.5}
.or{font-size:12px;color:var(--mut);text-align:center;margin:1px 0 9px}
.btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:10px 18px;font:inherit;font-size:14px;font-weight:700;cursor:pointer}
.btn:hover{background:#2c2880} .btn:disabled{opacity:.55;cursor:default}
.btn.sm{padding:8px 14px;font-size:13px}
.ghost{background:none;border:1px solid var(--bd);color:var(--mut)} .ghost:hover{background:#f0eee9;border-color:var(--mut)}
.thread{background:var(--card);border:1px solid var(--bd);border-radius:14px;margin-bottom:16px;overflow:hidden}
.thead{display:flex;gap:10px;align-items:flex-start;padding:13px 16px;background:#f3f1ec;border-bottom:1px solid var(--bd)}
.thead .jt{flex:1;min-width:0;font-size:13.5px;font-weight:700;color:var(--tx);line-height:1.4}
.thead .src{font-size:11px;font-weight:600;color:var(--acc);white-space:nowrap}
.xbtn{border:none;background:none;color:var(--mut);font-size:18px;cursor:pointer;line-height:1;padding:0 2px}
.xbtn:hover{color:#cf3b3b}
.msgs{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.m{max-width:88%;padding:10px 13px;border-radius:12px;font-size:14px;line-height:1.55;white-space:normal}
.m.user{align-self:flex-end;background:var(--acc);color:#fff;border-bottom-right-radius:4px}
.m.bot{align-self:flex-start;background:#f3f1ec;color:var(--tx);border:1px solid var(--bd);border-bottom-left-radius:4px}
.m.bot b{color:#155b38} .m.bot code{background:#eee;padding:1px 5px;border-radius:5px;font-size:13px}
.m.wait{align-self:flex-start;color:var(--mut);font-style:italic;font-size:13.5px}
.foot{display:flex;gap:8px;padding:0 16px 14px;align-items:flex-end}
.foot textarea{flex:1;min-height:42px;max-height:140px}
.empty{text-align:center;color:var(--mut);padding:30px 10px;font-size:14px}
</style></head><body><div class="wrap">
<a class="back" href="index.html">← Danh sách job phù hợp</a>
<h1>✍️ Đề xuất chỉnh sửa CV theo JD</h1>
<p class="sub">Mỗi JD là một khung chat riêng — dán JD/​link, nhận đề xuất <b>Hiện tại → Sửa thành</b>, rồi hỏi tiếp để tinh chỉnh. Chỉ gợi ý, không tự sửa CV, không bịa thông tin.</p>

<div class="box">
  <p class="note">➕ Thêm một JD mới (mỗi JD mở một khung chat riêng):</p>
  <input id="newurl" class="in" placeholder="🔗 Dán link LinkedIn job (tùy chọn)"/>
  <div class="or">— hoặc —</div>
  <textarea id="newjd" class="in ta" placeholder="Paste toàn bộ nội dung JD vào đây"></textarea>
  <button id="addBtn" class="btn">➕ Bắt đầu khung chat cho JD này</button>
</div>

<div id="threads"></div>
</div>
<script>
const KEY='cv_threads_v1';
const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function md(t){
  let h=esc(t);
  h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/__(.+?)__/g,'<b>$1</b>');
  h=h.replace(/(^|[^_])_([^_]+?)_/g,'$1<i>$2</i>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^\s*[-*]\s+(.*)$/gm,'• $1');
  return h.replace(/\n/g,'<br>');
}
let threads=[];
try{ threads=JSON.parse(localStorage.getItem(KEY)||'[]'); if(!Array.isArray(threads))threads=[]; }catch(e){ threads=[]; }
const busy=new Set();
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(threads)); }catch(e){} }
function uid(){ return 't'+Date.now()+Math.floor(Math.random()*1000); }
function title(t){ const s=(t.jd||t.url||'JD').split('\n')[0].trim(); return s.length>90?s.slice(0,90)+'…':s; }

const elT=document.getElementById('threads');
function render(){
  if(!threads.length){ elT.innerHTML='<div class="empty">Chưa có JD nào. Thêm một JD ở trên để bắt đầu 👆</div>'; return; }
  elT.innerHTML=threads.map(t=>{
    const waiting=busy.has(t.id);
    const msgs=t.messages.map(m=>'<div class="m '+(m.role==='user'?'user':'bot')+'">'+md(m.content)+'</div>').join('')
      +(waiting?'<div class="m wait">⏳ đang trả lời…</div>':'');
    return '<div class="thread" data-id="'+t.id+'">'
      +'<div class="thead"><div class="jt">📋 '+esc(title(t))+'</div>'
      +(t.jdSource?'<div class="src">'+esc(t.jdSource)+'</div>':'')
      +'<button class="xbtn" data-del="'+t.id+'" title="Xóa">✕</button></div>'
      +'<div class="msgs">'+msgs+'</div>'
      +'<div class="foot"><textarea class="in" data-inp="'+t.id+'" placeholder="Hỏi tiếp / yêu cầu chỉnh (vd: gọn hơn, tập trung kỹ năng X)…" '+(waiting?'disabled':'')+'></textarea>'
      +'<button class="btn sm" data-send="'+t.id+'" '+(waiting?'disabled':'')+'>Gửi</button></div>'
      +'</div>';
  }).join('');
}

async function ask(t){
  busy.add(t.id); render();
  try{
    const r=await fetch('/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jd:t.jd||'',url:t.url||'',messages:t.messages})});
    const data=await r.json();
    busy.delete(t.id);
    if(data.error){ t.messages.push({role:'assistant',content:'⚠️ '+data.error}); }
    else{
      if(data.resolved_jd && !t.jd) t.jd=data.resolved_jd;
      if(data.jd_source) t.jdSource=data.jd_source;
      t.messages.push({role:'assistant',content:data.reply||'(không có nội dung)'});
    }
    save(); render();
  }catch(e){
    busy.delete(t.id);
    t.messages.push({role:'assistant',content:'⚠️ Lỗi mạng: '+e.message+'. Hãy mở trang trên https://emchicolennha.vercel.app/cv.html (không phải file trên máy).'});
    save(); render();
  }
}

document.getElementById('addBtn').addEventListener('click',()=>{
  const jd=document.getElementById('newjd').value.trim();
  const url=document.getElementById('newurl').value.trim();
  if(!jd && !url){ alert('Hãy dán link LinkedIn hoặc paste JD.'); return; }
  const t={id:uid(),jd:jd,url:url,jdSource:jd?'JD đã dán':'',messages:[{role:'user',content:'Hãy đề xuất chỉnh sửa CV của tôi để khớp JD này.'}]};
  threads.unshift(t);
  document.getElementById('newjd').value=''; document.getElementById('newurl').value='';
  save(); render(); ask(t);
});

elT.addEventListener('click',e=>{
  const del=e.target.getAttribute('data-del');
  const send=e.target.getAttribute('data-send');
  if(del){ if(confirm('Xóa khung chat này?')){ threads=threads.filter(x=>x.id!==del); save(); render(); } return; }
  if(send){
    const t=threads.find(x=>x.id===send); if(!t||busy.has(t.id))return;
    const inp=elT.querySelector('[data-inp="'+send+'"]'); const txt=(inp.value||'').trim();
    if(!txt)return;
    t.messages.push({role:'user',content:txt}); save(); ask(t);
  }
});
elT.addEventListener('keydown',e=>{
  if(e.target.getAttribute('data-inp') && e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    const id=e.target.getAttribute('data-inp');
    const btn=elT.querySelector('[data-send="'+id+'"]'); if(btn)btn.click();
  }
});

render();
</script></body></html>
