<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Job phu hop voi CV cua ban</title>
<style>
:root{--bg:#f6f5f2;--card:#fff;--bd:#e6e3dd;--tx:#1d1c1a;--mut:#6a665f;--pri:#0a66c2}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--tx);
font-family:"Be Vietnam Pro","Segoe UI",system-ui,sans-serif;font-size:15px}
.wrap{max-width:1000px;margin:0 auto;padding:24px 16px}
h1{font-size:24px;margin:0 0 4px} .sub{color:var(--mut);margin:0 0 18px;font-size:14px}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--card);
border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:16px;position:sticky;top:8px;z-index:5}
.bar input,.bar select{border:1px solid var(--bd);border-radius:8px;padding:8px 10px;font:inherit;background:#fff}
.bar input{flex:1;min-width:160px}
.count{color:var(--mut);font-size:13px;margin-left:auto;font-weight:600}
.chk{font-size:13px;color:var(--mut);display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
.resetbtn{border:1px solid var(--bd);background:#fff;border-radius:8px;padding:8px 12px;font:inherit;font-size:13px;cursor:pointer;color:var(--mut)}
.resetbtn:hover{border-color:var(--pri);color:var(--pri)}
.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:12px}
.row1{display:flex;gap:14px;align-items:flex-start}
.badge{flex:0 0 auto;width:58px;height:58px;border-radius:12px;display:grid;place-items:center;
font-weight:800;font-size:18px;color:#fff}
.t{font-size:17px;font-weight:700;color:var(--tx);text-decoration:none;line-height:1.3}
.t:hover{color:var(--pri)}
.meta{color:var(--mut);font-size:13.5px;margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 14px}
.new{background:#0a66c2;color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-left:8px}
.reason{margin:12px 0 8px;font-size:14px;color:#333}
.flags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.flag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:7px}
.ok{background:#e3f4ec;color:#15663f} .no{background:#fbe6e6;color:#9c2626}
details{margin-top:6px} summary{cursor:pointer;color:var(--pri);font-size:13px;font-weight:600}
ul{margin:6px 0;padding-left:18px;font-size:13.5px;color:#444}
.kw{display:inline-block;background:#f2e9fb;color:#6a2ea0;border-radius:6px;padding:2px 8px;font-size:12px;margin:2px}
a.open{display:inline-block;margin-top:10px;background:var(--pri);color:#fff;text-decoration:none;
padding:7px 16px;border-radius:8px;font-size:13.5px;font-weight:600}
.empty{text-align:center;color:var(--mut);padding:40px}
</style></head><body><div class="wrap">
<h1>🎯 Job phù hợp với CV của bạn</h1>
<p class="sub">10 job · cập nhật 2026-06-21</p>
<p class="sub" style="color:#3a35a3;font-weight:600">🎯 Social Media (quản lý kênh), Marketing Communications / PR, Event / Activation · 📍 Hà Nội - onsite, Hybrid tại Hà Nội · 💰 ≥ 12 triệu · 📊 Executive / Specialist (không muốn cấp Manager/Director)</p>
<div class="bar">
  <input id="q" placeholder="🔍 Tìm theo vị trí / công ty..."/>
  <select id="sort">
    <option value="score">Sắp xếp: Độ phù hợp</option>
    <option value="company">Công ty (A-Z)</option>
    <option value="title">Vị trí (A-Z)</option>
  </select>
  <select id="minf">
    <option value="0">Tất cả điểm</option>
    <option value="50">≥ 50%</option>
    <option value="60">≥ 60%</option>
    <option value="70">≥ 70%</option>
  </select>
  <select id="company"><option value="">Tất cả công ty</option></select>
  <label class="chk"><input type="checkbox" id="onlyOk"/> Khớp hết tiêu chí</label>
  <label class="chk"><input type="checkbox" id="onlyNew"/> 🆕 Chỉ mới</label>
  <button id="reset" class="resetbtn">Xóa lọc</button>
  <span class="count" id="count"></span>
</div>
<div id="list"></div>
</div>
<script>
const JOBS = [{"score": 85, "title": "Senior digital marketing", "company": "Hong Ha Stationery Joint Stock Company", "location": "Hanoi Capital Region", "salary": "", "posted": "2026-06-19", "url": "https://vn.linkedin.com/jobs/view/senior-digital-marketing-at-hong-ha-stationery-joint-stock-company-4429619721", "reason": "CV có kinh nghiệm và kỹ năng phù hợp với yêu cầu của JD", "strengths": ["Kinh nghiệm quản lý kênh social media và marketing communications", "Kỹ năng phân tích dữ liệu và lập kế hoạch", "Có kinh nghiệm làm việc trong lĩnh vực giáo dục và FMCG"], "gaps": ["CV chưa có kinh nghiệm trực tiếp triển khai và tối ưu ngân sách quảng cáo từ 100 triệu VNĐ/tháng trở lên", "CV chưa có kinh nghiệm làm việc trong lĩnh vực E-commerce"], "keywords": ["Google Analytics 4 (GA4)", "Google Tag Manager", "Data Studio/Looker Studio"], "flags": ["✔ Huong cong viec phù hợp", "✔ Cap bac phù hợp", "✔ Dia diem Ha Noi", "✔ Thuoc nganh/loai cong ty uu tien", "✔ KHONG dinh dieu can tranh"], "new": true}, {"score": 85, "title": "Social Media Content", "company": "MCV Group", "location": "Hanoi", "salary": "", "posted": "2026-06-18", "url": "https://vn.linkedin.com/jobs/view/social-media-content-at-mcv-group-4429032027", "reason": "CV có kinh nghiệm quản lý kênh Facebook, TikTok và có khả năng sáng tạo, nhạy bén với xu hướng xã hội.", "strengths": ["Kinh nghiệm quản lý kênh Facebook, TikTok", "Khả năng sáng tạo, nhạy bén với xu hướng xã hội", "Có kiến thức về quản trị kênh Fanpage, TikTok"], "gaps": [], "keywords": [], "flags": ["✔ Huong cong viec: Social Media (quản lý kênh)", "✔ Cap bac: Executive/Specialist", "✔ Dia diem: Hà Nội", "✔ Loai cong ty: Brand / In-house", "✔ Nganh uu tien: Giáo dục / Đào tạo"], "new": true}, {"score": 85, "title": "Marketing & Sales Enablement", "company": "Vinova", "location": "Hanoi", "salary": "", "posted": "2026-06-15", "url": "https://vn.linkedin.com/jobs/view/marketing-sales-enablement-at-vinova-4427706848", "reason": "CV có kinh nghiệm và kỹ năng phù hợp với yêu cầu của JD", "strengths": ["Kinh nghiệm quản lý kênh và marketing communications", "Kỹ năng tổ chức sự kiện và hoạt động", "Kinh nghiệm làm việc trong môi trường startup và công nghệ"], "gaps": ["CV chưa có kinh nghiệm về CRM và automation", "CV chưa có kinh nghiệm về design coordination"], "keywords": ["CRM và automation", "Design coordination", "Sales enablement"], "flags": ["✔ Huong cong viec phù hợp", "✔ Cap bac Executive/Specialist", "✔ Dia diem Ha Noi", "✔ Thuoc nganh cong nghe/startup", "✔ KHONG dinh dieu can tranh"], "new": true}, {"score": 85, "title": "Marketing Content Specialist", "company": "Giải Pháp Nhân Sự Ánh Sáng (Light Human)", "location": "Hanoi Capital Region", "salary": "", "posted": "2026-06-15", "url": "https://vn.linkedin.com/jobs/view/marketing-content-specialist-at-gi%E1%BA%A3i-ph%C3%A1p-nh%C3%A2n-s%E1%BB%B1-%C3%A1nh-s%C3%A1ng-light-human-4427482994", "reason": "CV có kinh nghiệm và kỹ năng phù hợp với yêu cầu của JD", "strengths": ["Kinh nghiệm làm việc ở vị trí Content Marketing", "Kỹ năng viết, biên tập nội dung, giật tít thu hút", "Biết ứng dụng linh hoạt các công cụ AI hỗ trợ sáng tạo nội dung và thiết kế cơ bản"], "gaps": ["CV không có kinh nghiệm làm việc trong ngành Thời trang, Mỹ phẩm, Phong cách sống (Lifestyle)"], "keywords": ["Tư duy nhạy bén về tâm lý và hành vi mua sắm của phái đẹp", "Hiểu bản chất và có tư duy viết bài chuẩn SEO cơ bản"], "flags": ["✔ Huong cong viec: Social Media (quản lý kênh)", "✔ Dia diem / hinh thuc: Hà Nội - onsite", "✔ Cap bac nham toi: Executive / Specialist", "✔ Loai cong ty: Brand / In-house", "✔ Nganh uu tien: Giáo dục / Đào tạo"], "new": true}, {"score": 84, "title": "Social Series Content Creator", "company": "F.Learning Studio", "location": "Hanoi", "salary": "", "posted": "2026-06-19", "url": "https://vn.linkedin.com/jobs/view/social-series-content-creator-at-f-learning-studio-4429396762", "reason": "Ung viên có kinh nghiệm và kỹ năng phù hợp với vị trí Social Series Content Creator tại Hà Nội", "strengths": ["Kinh nghiệm quản lý kênh xã hội", "Kỹ năng viết và sáng tạo nội dung", "Kinh nghiệm tổ chức sự kiện"], "gaps": ["Thiếu kinh nghiệm cụ thể về tạo nội dung cho LinkedIn, TikTok, YouTube"], "keywords": ["LinkedIn", "TikTok", "YouTube"], "flags": ["✔ Executive", "✔ Hà Nội", "✔ Không yêu cầu đi tỉnh", "✔ Ngành giáo dục"], "new": true}, {"score": 82, "title": "Content Creator (1 năm kn, Up to 15M)", "company": "Công ty Cổ phần Thương Mại và Đầu tư Babies", "location": "Hanoi Capital Region", "salary": "", "posted": "2026-06-16", "url": "https://vn.linkedin.com/jobs/view/content-creator-1-n%C4%83m-kn-up-to-15m-at-c%C3%B4ng-ty-c%E1%BB%95-ph%E1%BA%A7n-th%C6%B0%C6%A1ng-m%E1%BA%A1i-v%C3%A0-%C4%91%E1%BA%A7u-t%C6%B0-babies-4427798465", "reason": "Ung viên có kinh nghiệm và kỹ năng phù hợp với yêu cầu công việc Content Creator tại Hà Nội", "strengths": ["Kinh nghiệm quản lý kênh social media", "Kỹ năng quay và dựng video", "Kinh nghiệm làm việc trong ngành giáo dục"], "gaps": ["Chưa có kinh nghiệm làm việc trong ngành Mẹ & bé", "Chưa có kỹ năng diễn xuất chuyên nghiệp"], "keywords": ["TikTok Ads", "YouTube Shorts", "Reels"], "flags": ["✔ Executive", "✔ Hà Nội", "✔ Ngành giáo dục", "✔ Không yêu cầu đi tỉnh"], "new": true}, {"score": 82, "title": "Internal Communications Specialist", "company": "GEM Careers", "location": "Hanoi", "salary": "", "posted": "2026-06-18", "url": "https://vn.linkedin.com/jobs/view/internal-communications-specialist-at-gem-careers-4427831696", "reason": "Ung viên có kinh nghiệm trong lĩnh vực truyền thông và sự kiện, phù hợp với yêu cầu của công việc", "strengths": ["Kinh nghiệm trong lĩnh vực truyền thông và sự kiện", "Kỹ năng quản lý và lãnh đạo", "Kỹ năng tạo nội dung và thiết kế"], "gaps": ["Thiếu kinh nghiệm trong lĩnh vực công nghệ", "Chưa có chứng chỉ chuyên môn trong lĩnh vực truyền thông"], "keywords": ["AI", "IT services", "Tech"], "flags": ["✔ Executive", "✔ Hà Nội", "✔ Không yêu cầu đi tỉnh"], "new": true}, {"score": 82, "title": "Marketing Executive", "company": "콴다(매스프레소)", "location": "Hanoi Capital Region", "salary": "", "posted": "2026-06-19", "url": "https://vn.linkedin.com/jobs/view/marketing-executive-at-qanda-mathpresso-4425048503", "reason": "Phù hợp với hướng công việc và tiêu chí của ứng viên", "strengths": ["Kinh nghiệm quản lý kênh truyền thông", "Kỹ năng viết nội dung trên các nền tảng mạng xã hội", "Kinh nghiệm làm việc trong lĩnh vực giáo dục"], "gaps": ["Chưa có kinh nghiệm làm việc với công nghệ AI"], "keywords": ["AI", "Công nghệ giáo dục"], "flags": ["✔ Executive", "✔ Hà Nội", "✔ Ngành giáo dục", "✔ Không yêu cầu đi tỉnh"], "new": true}, {"score": 82, "title": "Content Marketing Specialist (B2B, English markets)", "company": "BSS Commerce", "location": "Hanoi Capital Region", "salary": "", "posted": "2026-06-17", "url": "https://vn.linkedin.com/jobs/view/content-marketing-specialist-b2b-english-markets-at-bss-commerce-4428479568", "reason": "Ung viên có kinh nghiệm về marketing và truyền thông, phù hợp với vị trí Content Marketing Specialist", "strengths": ["Kinh nghiệm về quản lý kênh xã hội", "Kỹ năng viết và biên tập nội dung", "Kinh nghiệm về tổ chức sự kiện"], "gaps": ["Thiếu kinh nghiệm về Magento và Adobe Commerce", "Chưa có chứng chỉ về SEO"], "keywords": ["Magento", "Adobe Commerce", "SEO chuyên sâu"], "flags": ["✔ Executive/Specialist", "✔ Hà Nội", "✔ Không yêu cầu đi tỉnh", "✔ Lương trên 12 triệu"], "new": true}, {"score": 52, "title": "Content Moderator - No Experience Required", "company": "TELUS Digital", "location": "Hanoi Capital Region", "salary": "", "posted": "2026-06-17", "url": "https://vn.linkedin.com/jobs/view/content-moderator-no-experience-required-at-telus-digital-4429773099", "reason": "Vi tri Content Moderator khong phu hop voi huong cong viec Social Media, Marketing Communications/PR, Event/Activation", "strengths": [], "gaps": ["Khong co kinh nghiem ve Content Moderator", "Khong co ky nang ve quan ly noi dung"], "keywords": ["Content Moderator", "Content Safety", "Community Guidelines"], "flags": ["✘ Vi tri Content Moderator", "✘ Nganh khac"], "new": true}];
const color = s => s>=70?'#1f8a5b':s>=50?'#c87a16':'#cf3b3b';
const esc = t => (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const sort=document.getElementById('sort').value;
  const minf=+document.getElementById('minf').value;
  const comp=document.getElementById('company').value;
  const onlyOk=document.getElementById('onlyOk').checked;
  const onlyNew=document.getElementById('onlyNew').checked;
  let arr=JOBS.filter(j=> j.score>=minf
    && (j.title+' '+j.company).toLowerCase().includes(q)
    && (!comp || j.company===comp)
    && (!onlyOk || !(j.flags||[]).some(f=>f.includes('✘')))
    && (!onlyNew || j.new));
  arr.sort((a,b)=> sort==='score'? b.score-a.score :
    (a[sort]||'').localeCompare(b[sort]||''));
  document.getElementById('count').textContent=arr.length+' job';
  const L=document.getElementById('list');
  if(!arr.length){L.innerHTML='<div class="empty">'+(JOBS.length?'Không có job khớp bộ lọc.':'🕐 Chưa có job — hệ thống sẽ tự cập nhật job mới mỗi sáng.')+'</div>';return;}
  L.innerHTML=arr.map(j=>`
   <div class="card">
    <div class="row1">
     <div class="badge" style="background:${color(j.score)}">${j.score}<small style="font-size:11px">%</small></div>
     <div style="flex:1;min-width:0">
      <a class="t" href="${esc(j.url)}" target="_blank">${esc(j.title)}${j.new?'<span class="new">MOI</span>':''}</a>
      <div class="meta"><b style="color:#1d1c1a">${esc(j.company)}</b>
        ${j.location?'<span>📍 '+esc(j.location)+'</span>':''}
        ${j.salary?'<span>💰 '+esc(j.salary)+'</span>':''}
        ${j.posted?'<span>📅 '+esc(j.posted)+'</span>':''}</div>
     </div>
    </div>
    ${j.reason?'<div class="reason">💬 '+esc(j.reason)+'</div>':''}
    ${j.flags&&j.flags.length?'<div class="flags">'+j.flags.map(f=>{
      const no=f.includes('✘');return '<span class="flag '+(no?'no':'ok')+'">'+esc(f)+'</span>';}).join('')+'</div>':''}
    ${(j.strengths&&j.strengths.length)||(j.gaps&&j.gaps.length)?`<details><summary>Chi tiet khop / con thieu</summary>
      ${j.strengths&&j.strengths.length?'<b style="font-size:13px;color:#15663f">Khop:</b><ul>'+j.strengths.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ul>':''}
      ${j.gaps&&j.gaps.length?'<b style="font-size:13px;color:#8f560d">Con thieu:</b><ul>'+j.gaps.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ul>':''}
      ${j.keywords&&j.keywords.length?'<div>'+j.keywords.map(k=>'<span class="kw">'+esc(k)+'</span>').join('')+'</div>':''}
     </details>`:''}
    ${j.url?'<a class="open" href="'+esc(j.url)+'" target="_blank">Mo job ↗</a>':''}
   </div>`).join('');
}
// nap danh sach cong ty
[...new Set(JOBS.map(j=>j.company).filter(Boolean))].sort().forEach(c=>{
  const o=document.createElement('option'); o.value=c; o.textContent=c;
  document.getElementById('company').appendChild(o);
});
['q','sort','minf','company','onlyOk','onlyNew'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input',render); el.addEventListener('change',render);
});
document.getElementById('reset').onclick=()=>{
  document.getElementById('q').value=''; document.getElementById('sort').value='score';
  document.getElementById('minf').value='0'; document.getElementById('company').value='';
  document.getElementById('onlyOk').checked=false; document.getElementById('onlyNew').checked=false;
  render();
};
render();
</script></body></html>
